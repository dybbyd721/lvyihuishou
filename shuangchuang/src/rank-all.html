<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部排名</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei"}
        body{background:#f5f7fa;padding:15px}
        .container{max-width:600px;margin:0 auto;background:#fff;border-radius:12px;padding:20px}
        .page-title{font-size:20px;font-weight:bold;text-align:center;margin-bottom:20px}
        .rank-tabs{display:flex;gap:10px;margin-bottom:20px;border-bottom:1px solid #eee;padding-bottom:10px}
        .tab-item{padding:8px 16px;font-size:15px;color:#666;cursor:pointer;border-radius:8px}
        .tab-item.active{background:#22c55e;color:#fff}
        .rank-list{max-height:70vh;overflow-y:auto}
        .rank-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5}
        .rank-no{width:30px;text-align:center;font-size:14px;color:#999}
        .rank-name{flex:1;margin-left:10px;font-size:15px}
        .rank-score{font-size:15px;font-weight:bold;color:#22c55e}
        .rank-item:nth-child(1) .rank-no{color:#ffd700}
        .rank-item:nth-child(2) .rank-no{color:#c0c0c0}
        .rank-item:nth-child(3) .rank-no{color:#cd7f32}
        .back-btn{width:100%;padding:12px;background:#666;color:#fff;border:none;border-radius:8px;margin-top:20px;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <div class="page-title">文明榜单 · 前100名</div>
    <div class="rank-tabs">
        <div class="tab-item active" data-tab="p">个人排名</div>
        <div class="tab-item" data-tab="c">小区排名</div>
    </div>
    <div class="rank-list" id="pList"></div>
    <div class="rank-list" id="cList" style="display:none"></div>
    <button class="back-btn" onclick="location.href='index.html'">返回主页</button>
</div>

<script>
    // 脱敏
    function maskName(name) {
      const len = name.length;
      if (len === 2) return name[0] + '*';
      if (len === 3) return name[0] + '*' + name[2];
      if (len >= 4) return name[0] + '*'.repeat(len - 2) + name[len - 1];
      return name;
    }

    // ================== 前10名与主页完全固定一致 ==================
    const personalTop10 = [
      { name: maskName("张三"), score: 1980 },
      { name: maskName("李四"), score: 1920 },
      { name: maskName("王五"), score: 1850 },
      { name: maskName("赵六"), score: 1790 },
      { name: maskName("钱七"), score: 1730 },
      { name: maskName("孙八"), score: 1670 },
      { name: maskName("周九"), score: 1610 },
      { name: maskName("吴十"), score: 1550 },
      { name: maskName("郑十一"), score: 1490 },
      { name: maskName("王十二"), score: 1430 }
    ];

    const communityTop10 = [
      { name: "阳光花园", score: 28600 },
      { name: "幸福小区", score: 27900 },
      { name: "绿城花园", score: 27200 },
      { name: "金域华府", score: 26500 },
      { name: "悦湖湾", score: 25800 },
      { name: "盛世家园", score: 25100 },
      { name: "东方明珠", score: 24400 },
      { name: "星河湾", score: 23700 },
      { name: "御景园", score: 23000 },
      { name: "翰林苑", score: 22300 }
    ];

    // 生成个人100名（前10固定，后90顺延）
    function generatePersonal100() {
      const list = [...personalTop10];
      let lastScore = list[9].score;
      const firstNames = "张李王赵钱孙周吴郑陈刘黄徐马朱胡林郭何高".split('');
      const lastNames = "伟强磊敏静芳娜杰涛明超亮平勇丽".split('');

      for (let i = 10; i < 100; i++) {
        const fn = firstNames[Math.floor(Math.random() * firstNames.length)];
        const ln = lastNames[Math.floor(Math.random() * lastNames.length)];
        lastScore -= Math.floor(Math.random() * 12 + 8);
        list.push({ name: maskName(fn + ln), score: lastScore });
      }
      return list;
    }

    // 生成小区100名（前10固定，后90顺延）
    function generateCommunity100() {
      const list = [...communityTop10];
      let lastScore = list[9].score;
      const pres = "阳光幸福绿城金域悦湖盛世东方星河御景翰林".split('');
      const sufs = "花园小区华府湾家园明珠苑庭公馆城".split('');

      for (let i = 10; i < 100; i++) {
        const name = pres[Math.floor(Math.random() * pres.length)] + sufs[Math.floor(Math.random() * sufs.length)];
        lastScore -= Math.floor(Math.random() * 150 + 100);
        list.push({ name, score: lastScore });
      }
      return list;
    }

    // 渲染
    function render(list, id) {
      const dom = document.getElementById(id);
      dom.innerHTML = list.map((item, i) => `
        <div class="rank-item">
          <span class="rank-no">${i + 1}</span>
          <span class="rank-name">${item.name}</span>
          <span class="rank-score">${item.score} 分</span>
        </div>
      `).join('');
    }

    // 切换
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const t = tab.dataset.tab;
        document.getElementById('pList').style.display = t === 'p' ? 'block' : 'none';
        document.getElementById('cList').style.display = t === 'c' ? 'block' : 'none';
      });
    });

    // 初始化
    const p100 = generatePersonal100();
    const c100 = generateCommunity100();
    render(p100, 'pList');
    render(c100, 'cList');
</script>
</body>
</html>
