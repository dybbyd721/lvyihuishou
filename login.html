<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>绿益回收 - 登录</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
          min-height: 100vh;
          background: linear-gradient(135deg, #f0fff4 0%, #e6f7ef 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
        }
        .card {
          background: #fff;
          border-radius: 20px;
          box-shadow: 0 10px 30px rgba(46, 170, 88, 0.08);
          padding: 45px 35px;
          width: 100%;
          max-width: 420px;
          position: relative;
          overflow: hidden;
        }
        .card::before {
          content: "";
          position: absolute;
          top: 0; left: 0; width: 100%; height: 6px;
          background: linear-gradient(90deg, #2eaa58, #52c41a);
        }
        .logo-area {
          text-align: center;
          margin-bottom: 30px;
        }
        .logo-title {
          font-size: 26px;
          font-weight: 600;
          color: #2eaa58;
          margin-bottom: 6px;
        }
        .logo-subtitle {
          font-size: 14px;
          color: #666;
        }
        .role-select {
          display: flex;
          gap: 12px;
          margin-bottom: 20px;
        }
        .role-item {
          flex: 1;
          height: 44px;
          border: 1px solid #e0e0e0;
          border-radius: 12px;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          background: #fafdfb;
        }
        .role-item.active {
          background: #2eaa58;
          color: #fff;
          border-color: #2eaa58;
        }
        .input-group {
          margin-bottom: 20px;
        }
        .input-label {
          display: block;
          font-size: 14px;
          color: #333;
          margin-bottom: 8px;
        }
        .input-field {
          width: 100%;
          height: 50px;
          border: 1px solid #e0e0e0;
          border-radius: 12px;
          padding: 0 16px;
          font-size: 15px;
          outline: none;
          background: #fafdfb;
        }
        .input-field:focus {
          border-color: #2eaa58;
          box-shadow: 0 0 0 3px rgba(46, 170, 88, 0.1);
        }
        .main-btn {
          width: 100%;
          height: 52px;
          background: linear-gradient(90deg, #2eaa58, #48bd17);
          color: #fff;
          border: none;
          border-radius: 12px;
          font-size: 16px;
          cursor: pointer;
        }
        .link-group {
          text-align: center;
          margin-top: 25px;
          font-size: 13px;
          color: #999;
        }
        .link-group a {
          color: #2eaa58;
          text-decoration: none;
          margin: 0 6px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-area">
        <div class="logo-title">绿益回收</div>
        <div class="logo-subtitle">基于AI识别 · 环保积分平台</div>
    </div>

    <!-- 身份选择 -->
    <div class="role-select">
        <div class="role-item active" data-role="user">普通用户</div>
        <div class="role-item" data-role="staff">回收员</div>
    </div>

    <div class="input-group">
        <label class="input-label">账号 / 手机号</label>
        <input type="text" id="phone" class="input-field" placeholder="请输入账号">
    </div>
    <div class="input-group">
        <label class="input-label">密码</label>
        <input type="password" id="password" class="input-field" placeholder="请输入密码">
    </div>

    <button class="main-btn" id="loginBtn">登录</button>

    <div class="link-group">
        <a href="forget.html">忘记密码</a> |
        <a href="register.html">立即注册</a>
    </div>
</div>

<script>
    // 身份切换逻辑
    const roleItems = document.querySelectorAll('.role-item');
    let currentRole = 'user';

    roleItems.forEach(item => {
        item.addEventListener('click', () => {
            roleItems.forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            currentRole = item.dataset.role;
        });
    });

    // 登录逻辑（稳定版）
    document.getElementById('loginBtn').addEventListener('click', function() {
        const phone = document.getElementById('phone').value.trim();
        const pwd = document.getElementById('password').value.trim();

        if (!phone || !pwd) {
            alert("请输入手机号和密码");
            return;
        }

        // 根据身份调用不同接口
        const apiUrl = currentRole === 'user'
            ? 'http://localhost:3666/api/loginUser'
            : 'http://localhost:3666/api/loginStaff';

        fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone, password: pwd })
        })
        .then(res => res.json())
        .then(data => {
            console.log('接口返回数据:', data); // 调试用，方便看返回值
            if (data.ok) {
                alert("登录成功，即将跳转...");
                localStorage.setItem('user', JSON.stringify(data.data));
                // 根据角色跳转
                if (currentRole === 'user') {
                    location.href = 'index.html';
                } else {
                    location.href = '员工端.html';
                }
            } else {
                alert(data.msg || "登录失败");
            }
        })
        .catch(err => {
            console.error('请求错误:', err);
            alert('请求失败，请检查后端是否启动');
        });
    });
</script>
</body>
</html>
