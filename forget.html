<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>找回密码 - 绿益回收</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
          min-height: 100vh;
          background: linear-gradient(135deg, #f0fff4 0%, #e6f7ef 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
        }
        .card {
          background: #fff;
          border-radius: 20px;
          box-shadow: 0 10px 30px rgba(46, 170, 88, 0.08);
          padding: 45px 35px;
          width: 100%;
          max-width: 420px;
          position: relative;
          overflow: hidden;
        }
        .card::before {
          content: "";
          position: absolute;
          top: 0; left: 0; width: 100%; height: 6px;
          background: linear-gradient(90deg, #2eaa58, #52c41a);
        }
        .logo-area {
          text-align: center;
          margin-bottom: 30px;
        }
        .logo-title {
          font-size: 26px;
          font-weight: 600;
          color: #2eaa58;
          margin-bottom: 6px;
        }
        .logo-subtitle {
          font-size: 14px;
          color: #666;
        }
        .tab-wrap {
          display: flex;
          margin-bottom: 24px;
          border-radius: 12px;
          overflow: hidden;
          border: 1px solid #e5e5e5;
        }
        .tab-item {
          flex: 1;
          height: 44px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #f7f7f7;
          cursor: pointer;
          font-size: 15px;
        }
        .tab-item.active {
          background: #2eaa58;
          color: #fff;
        }
        .input-group {
          margin-bottom: 20px;
        }
        .input-label {
          display: block;
          font-size: 14px;
          color: #333;
          margin-bottom: 8px;
        }
        .input-field {
          width: 100%;
          height: 50px;
          border: 1px solid #e0e0e0;
          border-radius: 12px;
          padding: 0 16px;
          font-size: 15px;
          outline: none;
          background: #fafdfb;
        }
        .input-field:focus {
          border-color: #2eaa58;
          box-shadow: 0 0 0 3px rgba(46, 170, 88, 0.1);
        }
        .code-row {
          display: flex;
          gap: 12px;
        }
        .code-row input { flex:1; }
        .code-btn {
          width: 120px;
          height: 50px;
          border: 1px solid #2eaa58;
          background: #fff;
          color: #2eaa58;
          border-radius: 12px;
          cursor: pointer;
        }
        .code-btn:disabled {
          border-color: #ccc;
          color: #999;
        }
        .main-btn {
          width: 100%;
          height: 52px;
          background: linear-gradient(90deg, #2eaa58, #48bd17);
          color: #fff;
          border: none;
          border-radius: 12px;
          font-size: 16px;
          cursor: pointer;
        }
        .link-group {
          text-align: center;
          margin-top: 25px;
          font-size: 13px;
          color: #999;
        }
        .link-group a {
          color: #2eaa58;
          text-decoration: none;
        }
        .find-input { display: none; }
        .find-input.show { display: block; }
        .success-tip {
          color: #2eaa58;
          text-align: center;
          margin-top: 12px;
          display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-area">
        <div class="logo-title">找回密码</div>
        <div class="logo-subtitle">绿益回收 · 环保积分平台</div>
    </div>

    <div class="tab-wrap">
        <div class="tab-item active" onclick="switchFind('phone')">手机号找回</div>
        <div class="tab-item" onclick="switchFind('email')">邮箱找回</div>
    </div>

    <div class="input-group find-input show" id="findPhoneBox">
        <label class="input-label">手机号</label>
        <input type="text" class="input-field" placeholder="请输入绑定手机号">
    </div>

    <div class="input-group find-input" id="findEmailBox">
        <label class="input-label">邮箱</label>
        <input type="text" class="input-field" placeholder="请输入绑定邮箱">
    </div>

    <div class="input-group">
        <label class="input-label">验证码</label>
        <div class="code-row">
            <input type="text" class="input-field" placeholder="请输入验证码">
            <button class="code-btn" onclick="sendCode(this)">获取验证码</button>
        </div>
    </div>

    <div class="input-group">
        <label class="input-label">新密码</label>
        <input type="password" class="input-field" placeholder="设置新密码">
    </div>

    <div class="input-group">
        <label class="input-label">确认新密码</label>
        <input type="password" class="input-field" placeholder="再次输入新密码">
    </div>

    <button class="main-btn" onclick="resetSuccess()">确认重置</button>
    <div class="success-tip" id="tip">✔ 密码重置成功！</div>

    <div class="link-group">
        <a href="login.html">返回登录</a>
    </div>
</div>

<script>
    function switchFind(type) {
      const phoneBox = document.getElementById('findPhoneBox');
      const emailBox = document.getElementById('findEmailBox');
      const tabs = document.querySelectorAll('.tab-item');
      tabs.forEach(t=>t.classList.remove('active'));
      if(type === 'phone'){
        phoneBox.classList.add('show');
        emailBox.classList.remove('show');
        tabs[0].classList.add('active');
      } else {
        emailBox.classList.add('show');
        phoneBox.classList.remove('show');
        tabs[1].classList.add('active');
      }
    }

    function sendCode(btn) {
      if(btn.disabled) return;
      btn.disabled = true;
      let s = 60;
      btn.innerText = s+'秒后重发';
      const timer = setInterval(()=>{
        s--;
        if(s<=0){
          clearInterval(timer);
          btn.disabled = false;
          btn.innerText = '获取验证码';
        } else {
          btn.innerText = s+'秒后重发';
        }
      },1000);
    }

    function resetSuccess() {
      document.getElementById('tip').style.display = 'block';
      setTimeout(()=>{
        location.href = 'login.html';
      },1500);
    }
</script>

</body>
</html>
