<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>账号注册 - 绿益回收</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
          min-height: 100vh;
          background: linear-gradient(135deg, #f0fff4 0%, #e6f7ef 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
        }
        .card {
          background: #fff;
          border-radius: 20px;
          box-shadow: 0 10px 30px rgba(46, 170, 88, 0.08);
          padding: 45px 35px;
          width: 100%;
          max-width: 420px;
          position: relative;
          overflow: hidden;
        }
        .card::before {
          content: "";
          position: absolute;
          top: 0; left: 0; width: 100%; height: 6px;
          background: linear-gradient(90deg, #2eaa58, #52c41a);
        }
        .logo-area {
          text-align: center;
          margin-bottom: 30px;
        }
        .logo-title {
          font-size: 26px;
          font-weight: 600;
          color: #2eaa58;
          margin-bottom: 6px;
        }
        .logo-subtitle {
          font-size: 14px;
          color: #666;
        }
        .role-tabs {
          display: flex;
          margin-bottom: 24px;
          border-radius: 12px;
          overflow: hidden;
          border: 1px solid #e5e5e5;
        }
        .role-tab {
          flex: 1;
          height: 44px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #f7f7f7;
          cursor: pointer;
          font-size: 15px;
        }
        .role-tab.active {
          background: #2eaa58;
          color: #fff;
        }
        .input-group {
          margin-bottom: 20px;
        }
        .input-label {
          display: block;
          font-size: 14px;
          color: #333;
          margin-bottom: 8px;
        }
        .input-field {
          width: 100%;
          height: 50px;
          border: 1px solid #e0e0e0;
          border-radius: 12px;
          padding: 0 16px;
          font-size: 15px;
          outline: none;
          background: #fafdfb;
        }
        .input-field:focus {
          border-color: #2eaa58;
          box-shadow: 0 0 0 3px rgba(46, 170, 88, 0.1);
        }
        .code-row {
          display: flex;
          gap: 12px;
        }
        .code-row input { flex:1; }
        .code-btn {
          width: 120px;
          height: 50px;
          border: 1px solid #2eaa58;
          background: #fff;
          color: #2eaa58;
          border-radius: 12px;
          cursor: pointer;
        }
        .code-btn:disabled {
          border-color: #ccc;
          color: #999;
        }
        .main-btn {
          width: 100%;
          height: 52px;
          background: linear-gradient(90deg, #2eaa58, #48bd17);
          color: #fff;
          border: none;
          border-radius: 12px;
          font-size: 16px;
          cursor: pointer;
        }
        .agreement {
          font-size: 13px;
          color: #666;
          margin-top: 16px;
          display: flex;
          align-items: center;
          gap: 6px;
        }
        .link-group {
          text-align: center;
          margin-top: 25px;
          font-size: 13px;
          color: #999;
        }
        .link-group a {
          color: #2eaa58;
          text-decoration: none;
        }
        .staff-box {
          display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-area">
        <div class="logo-title">账号注册</div>
        <div class="logo-subtitle">绿益回收 · 环保积分平台</div>
    </div>

    <!-- 身份选择 -->
    <div class="role-tabs">
        <div class="role-tab active" onclick="switchRole('user')">用户注册</div>
        <div class="role-tab" onclick="switchRole('staff')">回收员注册</div>
    </div>

    <!-- 公用输入框 -->
    <div class="input-group">
        <label class="input-label">手机号</label>
        <input id="phone" type="text" class="input-field" placeholder="请输入11位手机号">
    </div>

    <!-- 回收员专用：工号 -->
    <div class="input-group staff-box" id="workIdBox">
        <label class="input-label">回收员工号</label>
        <input id="workId" type="text" class="input-field" placeholder="请输入工号">
    </div>

    <div class="input-group">
        <label class="input-label">验证码</label>
        <div class="code-row">
            <input id="code" type="text" class="input-field" placeholder="请输入验证码">
            <button id="sendCodeBtn" class="code-btn">获取验证码</button>
        </div>
    </div>

    <div class="input-group">
        <label class="input-label">设置密码</label>
        <input id="password" type="password" class="input-field" placeholder="6-16位密码">
    </div>

    <div class="input-group">
        <label class="input-label">确认密码</label>
        <input id="repassword" type="password" class="input-field" placeholder="再次输入密码">
    </div>

    <div class="agreement">
        <input type="checkbox" checked>
        <span>同意用户协议和隐私政策</span>
    </div>

    <button id="registerBtn" class="main-btn">完成注册</button>

    <div class="link-group">
        已有账号？<a href="login.html">返回登录</a>
    </div>
</div>

<script>
    let currentRole = 'user';

    // 切换身份（修复点击BUG）
    function switchRole(role) {
      currentRole = role;
      const tabs = document.querySelectorAll('.role-tab');
      tabs.forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      // 回收员显示工号
      if (role === 'staff') {
        document.getElementById('workIdBox').style.display = 'block';
      } else {
        document.getElementById('workIdBox').style.display = 'none';
      }
    }

    // 获取验证码
    document.getElementById('sendCodeBtn').onclick = function () {
      const phone = document.getElementById('phone').value.trim();
      if (!phone || phone.length !== 11) {
        alert('请输入正确手机号');
        return;
      }
      fetch('http://localhost:3666/api/sendCode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone })
      }).then(res => res.json()).then(data => {
        alert(data.msg);
        let btn = this;
        btn.disabled = true;
        let s = 60;
        let timer = setInterval(() => {
          s--;
          btn.innerText = s + '秒重发';
          if (s <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            btn.innerText = '获取验证码';
          }
        }, 1000);
      });
    };

    // 注册（自动区分用户/回收员）
    document.getElementById('registerBtn').onclick = function () {
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value.trim();
      const repassword = document.getElementById('repassword').value.trim();
      const code = document.getElementById('code').value.trim();
      const workId = document.getElementById('workId').value.trim();

      if (!phone || phone.length !== 11) return alert('请输入正确手机号');
      if (password.length < 6) return alert('密码至少6位');
      if (password !== repassword) return alert('两次密码不一致');
      if (!code) return alert('请输入验证码');
      if (currentRole === 'staff' && !workId) return alert('请输入回收员工号');

      // 区分接口
      const api = currentRole === 'user'
        ? 'http://localhost:3666/api/registerUser'
        : 'http://localhost:3666/api/registerStaff';

      const postData = currentRole === 'user'
        ? { phone, password, code }
        : { phone, password, code, workId };

      fetch(api, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(postData)
      }).then(res => res.json()).then(data => {
        alert(data.msg);
        if (data.ok) location.href = 'login.html';
      });
    };
</script>
</body>
</html>
